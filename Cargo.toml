[workspace]
members = [
    "crates/remcmd-app",
    "crates/remcmd-core",
    "crates/remcmd-ssh",
    "crates/remcmd-storage",
    "crates/remcmd-terminal",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
version = "0.1.0"

[workspace.dependencies]
gpui = "0.2.2"
remcmd-core = { path = "crates/remcmd-core"}
